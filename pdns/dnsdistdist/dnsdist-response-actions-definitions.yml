---
- name: "allow"
- name: "ClearRecordTypes"
  skip-cpp: true
  skip-rust: true
  parameters:
    - name: "types"
      type: "Vec<u16>"
      default: true
- name: "delay"
  parameters:
    - name: "msec"
      type: "u32"
- name: "drop"
- name: "LimitTTL"
  skip-cpp: true
  skip-rust: true
  parameters:
    - name: "min"
      type: "u32"
    - name: "max"
      type: "u32"
    - name: "types"
      type: "Vec<u16>"
      default: true
- name: "log"
  parameters:
    - name: "file-name"
      type: "String"
      default: ""
      cpp-optional: false
    - name: "append"
      type: "bool"
      default: "false"
      cpp-optional: false
    - name: "buffered"
      type: "bool"
      default: "false"
      cpp-optional: false
    - name: "verbose-only"
      type: "bool"
      default: "true"
      cpp-optional: false
    - name: "include-timestamp"
      type: "bool"
      default: "false"
      cpp-optional: false
- name: "lua"
  parameters:
    - name: "function"
      type: "dnsdist::actions::LuaResponseActionFunction"
      rust-type: "String"
- name: "LuaFFI"
  parameters:
    - name: "function"
      type: "dnsdist::actions::LuaResponseActionFFIFunction"
      rust-type: "String"
- name: "LuaFFIPerThread"
  parameters:
    - name: "code"
      type: "String"
- name: "SetExtendedDNSError"
  parameters:
    - name: "info-code"
      type: "u16"
    - name: "extra-text"
      type: "String"
      default: ""
      cpp-optional: false
- name: "SetMinTTL"
  skip-cpp: true
  skip-rust: true
  parameters:
    - name: "min"
      type: "u32"
- name: "SetMaxReturnedTTL"
  skip-cpp: true
  parameters:
    - name: "max"
      type: "u32"
- name: "SetMaxTTL"
  skip-cpp: true
  skip-rust: true
  parameters:
    - name: "max"
      type: "u32"
- name: "SetReducedTTL"
  parameters:
    - name: "percentage"
      type: "u8"
- name: "SetSkipCache"
- name: "SetTag"
  parameters:
    - name: "tag"
      type: "String"
    - name: "value"
      type: "String"
- name: "SNMPTrap"
  parameters:
    - name: "reason"
      type: "String"
      default: ""
      cpp-optional: false
- name: "TC"
