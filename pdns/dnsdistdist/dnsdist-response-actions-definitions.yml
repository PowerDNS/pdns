---
- name: "allow"
  description: "Let these packets go through."
- name: "ClearRecordTypes"
  description: "Removes given type(s) records from the response. Beware you can accidentally turn the answer into a NODATA response without a SOA record in the additional section in which case you may want to use NegativeAndSOAAction() to generate an answer, see example below. Subsequent rules are processed after this action."
  skip-cpp: true
  skip-rust: true
  parameters:
    - name: "types"
      type: "Vec<u16>"
      default: true
      description: "List of types to remove"
- name: "delay"
  parameters:
    - name: "msec"
      type: "u32"
- name: "DnstapLog"
  skip-cpp: true
  skip-rust: true
  parameters:
    - name: "identity"
      type: "String"
    - name: "logger-name"
      type: "String"
    - name: "alter-function"
      type: "dnsdist::actions::DnstapAlterResponseFunction"
      rust-type: "String"
      default: ""
- name: "drop"
- name: "LimitTTL"
  skip-cpp: true
  skip-rust: true
  parameters:
    - name: "min"
      type: "u32"
    - name: "max"
      type: "u32"
    - name: "types"
      type: "Vec<u16>"
      default: true
- name: "log"
  parameters:
    - name: "file-name"
      type: "String"
      default: ""
      cpp-optional: false
    - name: "append"
      type: "bool"
      default: "false"
      cpp-optional: false
    - name: "buffered"
      type: "bool"
      default: "false"
      cpp-optional: false
    - name: "verbose-only"
      type: "bool"
      default: "true"
      cpp-optional: false
    - name: "include-timestamp"
      type: "bool"
      default: "false"
      cpp-optional: false
- name: "lua"
  parameters:
    - name: "function"
      type: "dnsdist::actions::LuaResponseActionFunction"
      rust-type: "String"
- name: "LuaFFI"
  parameters:
    - name: "function"
      type: "dnsdist::actions::LuaResponseActionFFIFunction"
      rust-type: "String"
- name: "LuaFFIPerThread"
  parameters:
    - name: "code"
      type: "String"
- name: "RemoteLog"
  skip-cpp: true
  skip-rust: true
  parameters:
    - name: "logger-name"
      type: "String"
    - name: "alter-function"
      type: "dnsdist::actions::ProtobufAlterResponseFunction"
      rust-type: "String"
      default: ""
    - name: "server-id"
      type: "String"
      default: ""
    - name: "ip-encrypt-key"
      type: "String"
      default: ""
    - name: "include-cname"
      type: "bool"
      default: "false"
    - name: "export-tags"
      type: "Vec<String>"
      default: true
    - name: "export-extended-errors-to-meta"
      type: "String"
      default: ""
    - name: "metas"
      type: "Vec<ProtoBufMetaConfiguration>"
      default: true
- name: "SetExtendedDNSError"
  parameters:
    - name: "info-code"
      type: "u16"
    - name: "extra-text"
      type: "String"
      default: ""
      cpp-optional: false
- name: "SetMinTTL"
  skip-cpp: true
  skip-rust: true
  parameters:
    - name: "min"
      type: "u32"
- name: "SetMaxReturnedTTL"
  skip-cpp: true
  parameters:
    - name: "max"
      type: "u32"
- name: "SetMaxTTL"
  skip-cpp: true
  skip-rust: true
  parameters:
    - name: "max"
      type: "u32"
- name: "SetReducedTTL"
  parameters:
    - name: "percentage"
      type: "u8"
- name: "SetSkipCache"
- name: "SetTag"
  parameters:
    - name: "tag"
      type: "String"
    - name: "value"
      type: "String"
- name: "SNMPTrap"
  parameters:
    - name: "reason"
      type: "String"
      default: ""
      cpp-optional: false
- name: "TC"
